<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stock Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="splash">
        <div class="splash-title">Stock Manager</div>
        <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
    </div>

    <div id="auth">
        <div class="a-logo">Logo</div>
        <h1 class="a-title">Bienvenue</h1>
        <p id="pin-subtitle" class="a-sub">Sélectionnez votre opérateur et entrez votre PIN.</p>
        
        <div class="pin-dots">
            <div id="d0" class="dot"></div>
            <div id="d1" class="dot"></div>
            <div id="d2" class="dot"></div>
            <div id="d3" class="dot"></div>
        </div>

        <div class="pin-pad">
            <button class="pbtn" onclick="p('1' )">1</button>
            <button class="pbtn" onclick="p('2')">2</button>
            <button class="pbtn" onclick="p('3')">3</button>
            <button class="pbtn" onclick="p('4')">4</button>
            <button class="pbtn" onclick="p('5')">5</button>
            <button class="pbtn" onclick="p('6')">6</button>
            <button class="pbtn" onclick="p('7')">7</button>
            <button class="pbtn" onclick="p('8')">8</button>
            <button class="pbtn" onclick="p('9')">9</button>
            <button class="pbtn" onclick="p('C')">C</button>
            <button class="pbtn" onclick="p('0')">0</button>
            <button class="pbtn" onclick="p('OK')">OK</button>
        </div>
        
        <div style="display:flex; justify-content:center; margin-top:20px;">
            <select id="operator-select" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; width: 200px;" onchange="selectOperator(this.value)">
                <option value="">Chargement...</option>
            </select>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div id="s-dash" class="screen active"><h1>Dashboard</h1><p>Refs: <span id="s-refs">0</span></p></div>
        <div id="s-scan" class="screen"><h1>Scanner</h1></div>
        <div id="s-stock" class="screen"><h1>Stock</h1></div>
        <div id="s-hist" class="screen"><h1>Historique</h1></div>
    </div>

    <div id="tabbar" style="display:none; position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#1e293b; padding:10px 0;">
        <button onclick="go('dash')">Dash</button>
        <button onclick="go('scan')">Scan</button>
        <button onclick="go('stock')">Stock</button>
        <button onclick="go('hist')">Hist</button>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
